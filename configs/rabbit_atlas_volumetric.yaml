# M6: Volumetric atlas config — interior seeds + ball charts + 3-D interface sampling.
#
# Usage:
#   python experiments/run_poisson_rabbit_atlas_schwarz.py \
#       --config configs/rabbit_atlas_volumetric.yaml \
#       --atlas-data  runs/atlas_vol/rabbit_atlas_data.npz \
#       --atlas-meta  runs/atlas_vol/rabbit_atlas_meta.json \
#       --atlas-checkpoint runs/atlas_vol_trained/rabbit_atlas_trained.pt \
#       --sdf-checkpoint   runs/sdf_rabbit/sdf_rabbit_final.pt \
#       --output-dir runs/poisson_vol \
#       --volumetric-atlas
#
# Atlas build (new script):
#   python experiments/build_rabbit_atlas_volumetric.py \
#       --sdf-checkpoint runs/sdf_rabbit/sdf_rabbit_final.pt \
#       --n-charts 12 --n-interior-samples 50000 \
#       --frame-mode axis_aligned --output-dir runs/atlas_vol
#
# Atlas train (same script, new --volumetric flag):
#   python experiments/train_rabbit_atlas.py \
#       --atlas-data runs/atlas_vol/rabbit_atlas_data.npz \
#       --output-dir runs/atlas_vol_trained \
#       --volumetric --sdf-checkpoint runs/sdf_rabbit/sdf_rabbit_final.pt \
#       --epochs 3000 --w-domain 1.0

run:
  seed: 42
  n_charts: 12
  overlap_target: 0.20

# ---- atlas_build section is informational only for volumetric mode ----
# Use build_rabbit_atlas_volumetric.py instead; settings below are ignored.
atlas_build:
  n_surface_max: 30000
  frame_k: 96
  normal_k: 32

atlas_train:
  epochs: 3000
  lr: 8.0e-4
  width: 64
  depth: 4
  mask_width: 48
  mask_depth: 3
  det_delta: 1.0e-3
  coverage_thresh: 0.5
  w_recon: 1.0      # overridden by w_domain when --volumetric is passed
  w_mask: 0.5
  w_overlap: 0.8
  w_jac: 2.0
  w_coverage: 0.7

  gate_coverage: 0.99
  gate_overlap_consistency: 2.5e-2
  gate_foldover_ratio: 0.0
  gate_boundary_rmse: 3.0e-2  # bypassed in --volumetric mode (no surface ground truth)

poisson_schwarz:
  run_tag: ""
  device: "auto"
  dtype: "auto"
  amp: false
  tf32: false
  parallel_color_updates: false
  max_parallel_charts: 4
  stream_pool_size: 4
  interface_flux_mode: "projected"
  interface_transmission_mode: "penalty"
  robin_lambda: 10.0

  # M6: use seed-direction normals (mask_levelset precomputation skipped in volumetric mode)
  interface_normal_mode: "seed"
  interface_normal_eps: 1.0e-6
  interface_normal_blend: 0.0    # no blending needed; seed-direction is exact
  interface_normal_cache_batch: 2048

  pinn_width: 64
  pinn_depth: 4
  lr: 8.0e-4
  max_schwarz_iters: 60
  local_steps: 15
  omega: 0.8

  pde_batch: 192
  bc_batch: 192
  if_batch: 128
  xi_noise_scale: 0.10           # reduced: interior points already well-distributed
  eval_fixed_cache: false
  eval_cache_seed: 1234
  eval_cache_per_chart: 128
  eval_cache_per_overlap: 96
  sigma_floor: 1.0e-3
  det_floor: 1.0e-6
  jac_kappa_max: 1.0e3
  pde_clip_quantile: 0.98
  pde_huber_delta: 1.0
  pde_warmup_iters: 50

  # M4: PDE-dominant weights (inherited from rabbit_atlas_poisson.yaml M4 tuning)
  w_pde: 5.0
  w_bc: 1.0
  w_interface_value: 2.0
  w_interface_flux: 2.0
  w_interface_flux_start: null
  w_interface_flux_end: null
  flux_ramp_iters: 0

  bc_pretrain_epochs: 300
  bc_pretrain_batch: 256
  bc_pretrain_grad_weight: 0.05
  bc_pretrain_interface_weight: 0.2
  bc_pretrain_log_every: 50
  interior_pretrain_epochs: 0
  interior_pretrain_batch: 256
  interior_pretrain_grad_weight: 0.5
  interior_pretrain_log_every: 50

  residual_tol: 2.0e-3
  interface_tol: 8.0e-3
  interface_flux_tol: 1.5e-2
  plateau_patience: 15
  plateau_tol: 5.0e-5
  target_rel_l2: 1.5e-1
  guard_rel_l2: 0.0
  guard_patience: 0
  checkpoint_policy: "last"

  # M7: hard BC enforcement (optional; enable with --hard-bc on CLI)
  hard_bc: false
  hard_bc_scale: 0.05

  # M1: direct-coordinate PDE mode (not needed: identity frames give well-conditioned J)
  direct_coord_pde: false

  # M2 + M6: SDF-guided interior sampling
  # Pass --sdf-checkpoint on CLI; volumetric_atlas auto-enables SDF sampling.
  sdf_checkpoint: null           # override with --sdf-checkpoint <path>
  use_sdf_sampling: true         # explicit: SDF interior PDE sampling always active
  sdf_interior_threshold: 0.0
  sdf_rejection_factor: 6

  # M6: volumetric atlas mode — MUST be set for this config to work correctly
  volumetric_atlas: true

  # M8: residual-based adaptive sampling (RAR) — enable for faster convergence
  rar_period: 0                  # set to 10 to enable RAR
  rar_candidates: 512
  rar_top_k: 64
  rar_pool_max: 256
  rar_mix_n: 32

outputs:
  root: "runs"
  run_dir_pattern: "atlas_schwarz_vol_%Y%m%d_%H%M%S"

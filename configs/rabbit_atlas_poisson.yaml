# Default config for atlas-based rabbit reconstruction + Schwarz Poisson.

run:
  seed: 42
  n_charts: 12
  overlap_target: 0.20

atlas_build:
  n_surface_max: 30000
  frame_k: 96
  normal_k: 32

atlas_train:
  epochs: 3000
  lr: 8.0e-4
  width: 64
  depth: 4
  mask_width: 48
  mask_depth: 3
  det_delta: 1.0e-3
  coverage_thresh: 0.5
  w_recon: 1.0
  w_mask: 0.5
  w_overlap: 0.8
  w_jac: 2.0
  w_coverage: 0.7

  gate_coverage: 0.99
  gate_overlap_consistency: 2.5e-2
  gate_foldover_ratio: 0.0
  gate_boundary_rmse: 3.0e-2

poisson_schwarz:
  run_tag: ""
  device: "auto"
  dtype: "auto"
  amp: false
  tf32: false
  parallel_color_updates: false
  max_parallel_charts: 4
  stream_pool_size: 4
  interface_flux_mode: "projected"
  interface_transmission_mode: "penalty"
  robin_lambda: 10.0
  interface_normal_mode: "mask_levelset"
  interface_normal_eps: 1.0e-6
  interface_normal_blend: 0.15
  interface_normal_cache_batch: 2048

  pinn_width: 64
  pinn_depth: 4
  lr: 8.0e-4
  max_schwarz_iters: 60
  local_steps: 15
  omega: 0.8

  pde_batch: 192
  bc_batch: 192
  if_batch: 128
  xi_noise_scale: 0.30
  eval_fixed_cache: false
  eval_cache_seed: 1234
  eval_cache_per_chart: 128
  eval_cache_per_overlap: 96
  sigma_floor: 1.0e-3
  det_floor: 1.0e-6
  jac_kappa_max: 1.0e3
  pde_clip_quantile: 0.98
  pde_huber_delta: 1.0
  pde_warmup_iters: 50

  # M4: rebalanced so PDE dominates and interface flux is strongly enforced
  w_pde: 5.0
  w_bc: 1.0
  w_interface_value: 2.0
  w_interface_flux: 2.0
  w_interface_flux_start: null
  w_interface_flux_end: null
  flux_ramp_iters: 0

  bc_pretrain_epochs: 300
  bc_pretrain_batch: 256
  bc_pretrain_grad_weight: 0.05
  bc_pretrain_interface_weight: 0.2
  bc_pretrain_log_every: 50
  interior_pretrain_epochs: 0
  interior_pretrain_batch: 256
  interior_pretrain_grad_weight: 0.5
  interior_pretrain_log_every: 50

  residual_tol: 2.0e-3
  interface_tol: 8.0e-3
  interface_flux_tol: 1.5e-2
  plateau_patience: 15
  plateau_tol: 5.0e-5
  target_rel_l2: 1.5e-1
  guard_rel_l2: 0.0
  guard_patience: 0
  checkpoint_policy: "last"

  # M7: hard BC enforcement via SDF-based lifting
  hard_bc: false
  hard_bc_scale: 0.05

  # M1/W1: direct-coordinate PDE mode — bypasses the learned decoder Jacobian
  # and computes the Laplacian in the rigid TNB frame instead.  Must be true so
  # that training, eval_global_metrics, and eval_rel_l2_subset all operate on
  # the same coordinate frame as the pretrain supervision (TNB-based).
  direct_coord_pde: true

  # M2: SDF-guided interior sampling
  sdf_checkpoint: null
  use_sdf_sampling: false
  sdf_interior_threshold: 0.0
  sdf_rejection_factor: 6

  # M8: residual-based adaptive sampling (RAR)
  rar_period: 0
  rar_candidates: 512
  rar_top_k: 64
  rar_pool_max: 256
  rar_mix_n: 32

outputs:
  root: "runs"
  run_dir_pattern: "atlas_schwarz_%Y%m%d_%H%M%S"

if-cache-per-pair: 800
n-obs-per-chart: 512
pde-batch: 96
bc-batch: 128
if-batch: 96
xi-noise-scale: 0.08
normal-noise-boost: 1.4

w-data: 80.0
w-eq: 1.0
w-if-val: 5.0
w-if-flux: 20.0
w-rbm: 20.0
w-reg: 1e-2

sigma-floor: 1e-6
detJ-floor: 1e-6
jac-kappa-max: 1e4
eq-residual-clip: 200.0
b-true-clip: 200.0

kappa-fixed: 80.0

# true parameters
mu-m-true: 1.80
N-m-true: 4.80
k-f-true: 2.20
N-f-true: 5.20

# initial guess (~within 5%)

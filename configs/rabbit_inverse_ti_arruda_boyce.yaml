# acceptance
acc-param-rel-percent: 5.0
acc-surface-rel-l2: 1e-2

# identifiability gate
sensitivity-n-surface: 3000
sensitivity-cond-max: 1e5

# export
blend-temp: 1.0
export-points-per-chart: 2200
